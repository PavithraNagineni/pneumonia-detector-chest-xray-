<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pneumonia Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
    p.sub { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }

    .upload-zone {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #0f172a;
    }
    .upload-zone:hover { border-color: #3b82f6; background: #1e3a5f; }
    .upload-zone.dragging { border-color: #3b82f6; background: #1e3a5f; }
    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-text { color: #94a3b8; font-size: 14px; }
    .upload-text span { color: #3b82f6; font-weight: 600; cursor: pointer; }

    input[type="file"] { display: none; }

    #preview-wrap { margin-top: 20px; display: none; text-align: center; }
    #preview {
      max-width: 100%; max-height: 260px;
      border-radius: 10px;
      border: 2px solid #334155;
    }
    #file-name { font-size: 13px; color: #64748b; margin-top: 8px; }

    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    #result { margin-top: 24px; display: none; }
    .result-card {
      border-radius: 12px;
      padding: 20px 24px;
      border-left: 5px solid;
    }
    .result-card.pneumonia { background: #2d1515; border-color: #ef4444; }
    .result-card.normal    { background: #0d2d1a; border-color: #22c55e; }

    .result-label { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .result-label.pneumonia { color: #f87171; }
    .result-label.normal    { color: #4ade80; }

    .result-conf { font-size: 14px; color: #94a3b8; margin-bottom: 14px; }

    .prob-row { margin-bottom: 10px; }
    .prob-label { font-size: 13px; color: #94a3b8; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .prob-bar-bg { background: #1e293b; border-radius: 6px; height: 8px; }
    .prob-bar { height: 8px; border-radius: 6px; transition: width 0.6s ease; }
    .prob-bar.pneumonia { background: #ef4444; }
    .prob-bar.normal    { background: #22c55e; }

    .recommendation {
      margin-top: 14px;
      font-size: 13px;
      color: #cbd5e1;
      background: #0f172a;
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.5;
    }
    .meta { font-size: 12px; color: #475569; margin-top: 10px; }

    .loader {
      display: none;
      text-align: center;
      padding: 20px;
      color: #64748b;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <h1>🫁 Pneumonia Detection</h1>
  <p class="sub">ResNet-50 deep learning model — upload a chest X-ray to analyze</p>

  <div class="upload-zone" id="dropZone">
    <div class="upload-icon">📤</div>
    <div class="upload-text">
      Drag & drop a chest X-ray image here<br>or <span onclick="document.getElementById('fileInput').click()">browse files</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
  </div>

  <div id="preview-wrap">
    <img id="preview" src="" alt="X-ray preview"/>
    <div id="file-name"></div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyze()" disabled>
    Analyze X-Ray
  </button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    Analyzing X-ray...
  </div>

  <div id="result"></div>
</div>

<script>
  const API_URL = 'http://localhost:8001';
  let selectedFile = null;

  // Drag & drop
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragging');
    handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('preview').src = e.target.result;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('preview-wrap').style.display = 'block';
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('result').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if (!selectedFile) return;
    document.getElementById('loader').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = true;

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res  = await fetch(`${API_URL}/predict`, { method: 'POST', body: formData });
      const data = await res.json();
      showResult(data);
    } catch (err) {
      showError(err.message);
    } finally {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  function showResult(data) {
    const isPneumonia = data.label === 'PNEUMONIA';
    const cls         = isPneumonia ? 'pneumonia' : 'normal';
    const icon        = isPneumonia ? '⚠️' : '✅';
    const normalPct   = (data.probabilities['NORMAL']    * 100).toFixed(1);
    const pneuPct     = (data.probabilities['PNEUMONIA'] * 100).toFixed(1);

    document.getElementById('result').innerHTML = `
      <div class="result-card ${cls}">
        <div class="result-label ${cls}">${icon} ${data.label}</div>
        <div class="result-conf">Confidence: ${(data.confidence * 100).toFixed(2)}%</div>

        <div class="prob-row">
          <div class="prob-label"><span>Normal</span><span>${normalPct}%</span></div>
          <div class="prob-bar-bg"><div class="prob-bar normal" style="width:${normalPct}%"></div></div>
        </div>
        <div class="prob-row">
          <div class="prob-label"><span>Pneumonia</span><span>${pneuPct}%</span></div>
          <div class="prob-bar-bg"><div class="prob-bar pneumonia" style="width:${pneuPct}%"></div></div>
        </div>

        <div class="recommendation">${data.recommendation}</div>
        <div class="meta">Inference time: ${data.inference_time_ms}ms · Model: ResNet-50</div>
      </div>`;
    document.getElementById('result').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('result').innerHTML = `
      <div class="result-card pneumonia">
        <div class="result-label pneumonia">❌ Error</div>
        <div class="recommendation">${msg}<br>Make sure the API server is running on port 8001.</div>
      </div>`;
    document.getElementById('result').style.display = 'block';
  }
</script>
</body>
</html>
